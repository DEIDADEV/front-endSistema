<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Cadastro de Pacientes</title>
</head>

<body class="bg-light">

<div class="d-flex">

  <!-- Sidebar -->
  <div class="bg-primary text-white p-3" style="width: 250px; min-height: 100vh;">
    <h4>
      <a href="principal.html" class="text-white text-decoration-none">Agenda Médica</a>
    </h4>
    <hr>
    <ul class="nav nav-pills flex-column">
      <li class="nav-item"><a href="novaConsulta.html" class="nav-link text-white">Nova Consulta</a></li>
      <li class="nav-item"><a href="listaDeConsultas.html" class="nav-link text-white">Consultas</a></li>
      <li class="nav-item"><a href="medicos.html" class="nav-link text-white">Médicos</a></li>
      <li class="nav-item"><a href="pacientes.html" class="nav-link text-white">Pacientes</a></li>
    </ul>
  </div>

  <!-- Conteúdo -->
  <div class="flex-fill p-4" id="conteudoPrincipal">
    <h2>Cadastro de Pacientes</h2>

    <!-- FORMULÁRIO -->
    <form id="formPaciente">
      <div class="mb-3">
        <label for="nome" class="form-label">Nome:</label>
        <input type="text" id="nome" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="cpf" class="form-label">CPF:</label>
        <input type="text" id="cpf" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="dataNascimento" class="form-label">Data de Nascimento:</label>
        <input type="date" id="dataNascimento" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary" id="btnSalvar">Cadastrar</button>
      <button type="button" class="btn btn-secondary ms-2" id="btnCancelar" style="display:none;">Cancelar</button>
    </form>

    <div id="mensagemPaciente" class="mt-3"></div>

    <hr>

    <!-- TABELA -->
    <h3>Pacientes Cadastrados</h3>
    <table class="table table-bordered align-middle text-center">
      <thead>
        <tr>
          <th>Nome</th>
          <th>CPF</th>
          <th>Data de Nascimento</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="pacientesBody"></tbody>
    </table>

  </div>
</div>

<script>
const API_URL = "http://localhost:8080/api/pacientes";

const formPaciente = document.getElementById("formPaciente");
const mensagemPaciente = document.getElementById("mensagemPaciente");
const pacientesBody = document.getElementById("pacientesBody");
const btnSalvar = document.getElementById("btnSalvar");
const btnCancelar = document.getElementById("btnCancelar");

let pacientes = [];
let editandoId = null;

// ============================
// CARREGAR PACIENTES
// ============================
async function carregarPacientes() {
  try {
    const res = await fetch(API_URL);
    pacientes = await res.json();
    renderizarTabela();
  } catch (err) {
    pacientesBody.innerHTML = '<tr><td colspan="4">Erro ao carregar pacientes.</td></tr>';
    console.error(err);
  }
}

// ============================
// RENDERIZAR TABELA
// ============================
function renderizarTabela() {
  pacientesBody.innerHTML = '';

  pacientes.forEach(p => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${p.nome}</td>
      <td>${p.cpf}</td>
      <td>${p.dataNascimento}</td>
      <td>
        <button class="btn btn-sm btn-warning me-1" onclick="editarPaciente(${p.id})">Editar</button>
        <button class="btn btn-sm btn-danger" onclick="excluirPaciente(${p.id})">Excluir</button>
      </td>
    `;

    pacientesBody.appendChild(tr);
  });
}

// ============================
// CADASTRAR OU ATUALIZAR
// ============================
formPaciente.addEventListener("submit", async (e) => {
  e.preventDefault();

  const paciente = {
    nome: document.getElementById("nome").value,
    cpf: document.getElementById("cpf").value,
    dataNascimento: document.getElementById("dataNascimento").value
  };

  try {
    let res;

    if (editandoId) {
      // Atualizar
      res = await fetch(`${API_URL}/${editandoId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(paciente)
      });
    } else {
      // Cadastrar
      res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(paciente)
      });
    }

    if (res.ok) {
      mensagemPaciente.innerHTML =
        `<div class="alert alert-success">
          ${editandoId ? "Paciente atualizado" : "Paciente cadastrado"} com sucesso!
        </div>`;

      formPaciente.reset();
      editandoId = null;
      btnSalvar.textContent = "Cadastrar";
      btnCancelar.style.display = "none";
      await carregarPacientes();
    } else {
      mensagemPaciente.innerHTML =
        `<div class="alert alert-danger">
          Erro ao ${editandoId ? "atualizar" : "cadastrar"} paciente.
        </div>`;
    }

  } catch (err) {
    mensagemPaciente.innerHTML =
      `<div class="alert alert-danger">
        Erro ao ${editandoId ? "atualizar" : "cadastrar"} paciente.
      </div>`;
    console.error(err);
  }
});

// ============================
// EDITAR
// ============================
function editarPaciente(id) {
  const paciente = pacientes.find(p => p.id === id);
  if (!paciente) return;

  document.getElementById("nome").value = paciente.nome;
  document.getElementById("cpf").value = paciente.cpf;
  document.getElementById("dataNascimento").value = paciente.dataNascimento;

  editandoId = id;
  btnSalvar.textContent = "Atualizar";
  btnCancelar.style.display = "inline-block";
}

// ============================
// CANCELAR EDIÇÃO
// ============================
btnCancelar.addEventListener("click", () => {
  formPaciente.reset();
  editandoId = null;
  btnSalvar.textContent = "Cadastrar";
  btnCancelar.style.display = "none";
});

// ============================
// EXCLUIR
// ============================
async function excluirPaciente(id) {
  if (!confirm("Tem certeza que deseja excluir este paciente?")) return;

  try {
    const res = await fetch(`${API_URL}/${id}`, {
      method: "DELETE"
    });

    if (res.status === 204 || res.ok) {
      mensagemPaciente.innerHTML =
        `<div class="alert alert-success">
          Paciente excluído com sucesso!
        </div>`;
      await carregarPacientes();
    } else {
      mensagemPaciente.innerHTML =
        `<div class="alert alert-danger">
          Erro ao excluir paciente.
        </div>`;
    }

  } catch (err) {
    mensagemPaciente.innerHTML =
      `<div class="alert alert-danger">
        Erro ao excluir paciente.
      </div>`;
    console.error(err);
  }
}

// ============================
// INICIALIZAÇÃO
// ============================
window.addEventListener("DOMContentLoaded", () => {
  carregarPacientes();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
