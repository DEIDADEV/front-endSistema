<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Cadastro de Pacientes</title>
</head>

<body class="bg-light">

<div class="d-flex">

  <!-- Sidebar -->
  <div class="bg-primary text-white p-3" style="width: 250px; min-height: 100vh;">
    <h4>
      <a href="principal.html" class="text-white text-decoration-none">Agenda Médica</a>
    </h4>
    <hr>
    <ul class="nav nav-pills flex-column">
      <li class="nav-item"><a href="novaConsulta.html" class="nav-link text-white">Nova Consulta</a></li>
      <li class="nav-item"><a href="listaDeConsultas.html" class="nav-link text-white">Consultas</a></li>
      <li class="nav-item"><a href="medicos.html" class="nav-link text-white">Médicos</a></li>
      <li class="nav-item"><a href="pacientes.html" class="nav-link text-white">Pacientes</a></li>
    </ul>
  </div>

  <!-- Conteúdo -->
  <div class="flex-fill p-4">
    <h2>Cadastro de Pacientes</h2>

    <form id="formPaciente">
      <div class="mb-3">
        <label for="nome" class="form-label">Nome:</label>
        <input type="text" id="nome" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="cpf" class="form-label">CPF:</label>
        <input type="text" id="cpf" class="form-control" maxlength="14" required>
      </div>

      <div class="mb-3">
        <label for="dataNascimento" class="form-label">Data de Nascimento:</label>
        <input type="date" id="dataNascimento" class="form-control"
               required
               min="1900-01-01">
      </div>

      <button type="submit" class="btn btn-primary" id="btnSalvar">Cadastrar</button>
      <button type="button" class="btn btn-secondary ms-2" id="btnCancelar" style="display:none;">Cancelar</button>
    </form>

    <div id="mensagemPaciente" class="mt-3"></div>

    <hr>

    <h3>Pacientes Cadastrados</h3>
    <table class="table table-bordered align-middle text-center">
      <thead>
        <tr>
          <th>Nome</th>
          <th>CPF</th>
          <th>Data de Nascimento</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="pacientesBody"></tbody>
    </table>

  </div>
</div>

<script>
const API_URL = "http://localhost:8080/api/pacientes";

const formPaciente = document.getElementById("formPaciente");
const mensagemPaciente = document.getElementById("mensagemPaciente");
const pacientesBody = document.getElementById("pacientesBody");
const btnSalvar = document.getElementById("btnSalvar");
const btnCancelar = document.getElementById("btnCancelar");
const cpfInput = document.getElementById("cpf");
const dataInput = document.getElementById("dataNascimento");

let pacientes = [];
let editandoId = null;

/* ============================
   DEFINIR DATA MÁXIMA COMO HOJE
============================ */
function definirDataMaximaHoje() {
  const hoje = new Date();
  const yyyy = hoje.getFullYear();
  const mm = String(hoje.getMonth() + 1).padStart(2, '0');
  const dd = String(hoje.getDate()).padStart(2, '0');
  const hojeFormatado = `${yyyy}-${mm}-${dd}`;
  dataInput.setAttribute("max", hojeFormatado);
}

definirDataMaximaHoje();

/* ============================
   MÁSCARA CPF
============================ */
cpfInput.addEventListener("input", function () {
  let valor = this.value.replace(/\D/g, "");
  valor = valor.substring(0, 11);

  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

  this.value = valor;
});

/* ============================
   VALIDAÇÃO CPF
============================ */
function cpfValidoBasico(cpf) {
  cpf = cpf.replace(/\D/g, "");
  return cpf.length === 11;
}

/* ============================
   VALIDAÇÃO DATA COMPLETA
============================ */
function dataValida(data) {

  if (!data) return false;

  const regex = /^\d{4}-\d{2}-\d{2}$/;
  if (!regex.test(data)) return false;

  const [ano] = data.split("-");
  if (ano.length !== 4) return false;

  const dataObj = new Date(data);
  if (isNaN(dataObj.getTime())) return false;

  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  if (dataObj > hoje) return false; // BLOQUEIA DATA FUTURA

  return true;
}

/* ============================
   FORMATAR DATA BR
============================ */
function formatarDataBR(dataISO) {
  if (!dataISO) return '';
  const [ano, mes, dia] = dataISO.split('-');
  return `${dia}/${mes}/${ano}`;
}

/* ============================
   FORMATAR CPF
============================ */
function formatarCPF(cpf) {
  if (!cpf) return '';
  cpf = cpf.replace(/\D/g, "");
  return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,
    "$1.$2.$3-$4");
}

/* ============================
   CARREGAR PACIENTES
============================ */
async function carregarPacientes() {
  try {
    const res = await fetch(API_URL);
    pacientes = await res.json();
    renderizarTabela();
  } catch {
    pacientesBody.innerHTML = '<tr><td colspan="4">Erro ao carregar pacientes.</td></tr>';
  }
}

/* ============================
   RENDERIZAR TABELA
============================ */
function renderizarTabela() {
  pacientesBody.innerHTML = '';

  pacientes.forEach(p => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${p.nome}</td>
      <td>${formatarCPF(p.cpf)}</td>
      <td>${formatarDataBR(p.dataNascimento)}</td>
      <td>
        <button class="btn btn-sm btn-warning me-1" onclick="editarPaciente(${p.id})">Editar</button>
        <button class="btn btn-sm btn-danger" onclick="excluirPaciente(${p.id})">Excluir</button>
      </td>
    `;

    pacientesBody.appendChild(tr);
  });
}

/* ============================
   SUBMIT
============================ */
formPaciente.addEventListener("submit", async (e) => {
  e.preventDefault();

  mensagemPaciente.innerHTML = "";

  const cpfLimpo = cpfInput.value.replace(/\D/g, "");
  const dataNascimento = dataInput.value;

  if (!cpfValidoBasico(cpfLimpo)) {
    mensagemPaciente.innerHTML =
      `<div class="alert alert-danger">CPF deve conter 11 dígitos.</div>`;
    return;
  }

  if (!dataValida(dataNascimento)) {
    mensagemPaciente.innerHTML =
      `<div class="alert alert-danger">
        Data de nascimento inválida. Não é permitido ano futuro.
      </div>`;
    return;
  }

  const paciente = {
    nome: document.getElementById("nome").value,
    cpf: cpfLimpo,
    dataNascimento: dataNascimento
  };

  try {

    const metodo = editandoId ? "PUT" : "POST";
    const url = editandoId ? `${API_URL}/${editandoId}` : API_URL;

    const res = await fetch(url, {
      method: metodo,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(paciente)
    });

    let mensagemErroBackend = "";

    try {
      const erroJson = await res.json();
      mensagemErroBackend = erroJson.message || "";
    } catch {}

    if (res.status === 409 || mensagemErroBackend.toUpperCase().includes("CPF")) {
      mensagemPaciente.innerHTML =
        `<div class="alert alert-danger">
          Já existe um paciente cadastrado com este CPF.
        </div>`;
      return;
    }

    if (!res.ok) {
      mensagemPaciente.innerHTML =
        `<div class="alert alert-danger">Erro ao salvar paciente.</div>`;
      return;
    }

    mensagemPaciente.innerHTML =
      `<div class="alert alert-success">
        ${editandoId ? "Paciente atualizado" : "Paciente cadastrado"} com sucesso!
      </div>`;

    formPaciente.reset();
    editandoId = null;
    btnSalvar.textContent = "Cadastrar";
    btnCancelar.style.display = "none";

    await carregarPacientes();

  } catch {
    mensagemPaciente.innerHTML =
      `<div class="alert alert-danger">Erro ao conectar com o servidor.</div>`;
  }
});

/* ============================
   EDITAR
============================ */
function editarPaciente(id) {
  const paciente = pacientes.find(p => p.id === id);
  if (!paciente) return;

  document.getElementById("nome").value = paciente.nome;
  document.getElementById("cpf").value = formatarCPF(paciente.cpf);
  document.getElementById("dataNascimento").value = paciente.dataNascimento;

  editandoId = id;
  btnSalvar.textContent = "Atualizar";
  btnCancelar.style.display = "inline-block";
}

/* ============================
   CANCELAR
============================ */
btnCancelar.addEventListener("click", () => {
  formPaciente.reset();
  editandoId = null;
  btnSalvar.textContent = "Cadastrar";
  btnCancelar.style.display = "none";
});

/* ============================
   EXCLUIR
============================ */
async function excluirPaciente(id) {
  if (!confirm("Tem certeza que deseja excluir este paciente?")) return;
  await fetch(`${API_URL}/${id}`, { method: "DELETE" });
  await carregarPacientes();
}

window.addEventListener("DOMContentLoaded", carregarPacientes);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
