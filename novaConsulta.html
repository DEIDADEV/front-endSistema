<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Nova Consulta</title>

<style>

.dropdown-status{
position:relative;
display:inline-block;
width:140px;
text-align:center;
font-weight:bold;
}

.dropdown-status-btn{
width:100%;
padding:.375rem .75rem;
border:1px solid #ced4da;
border-radius:.25rem;
color:#fff;
cursor:pointer;
}

.dropdown-status-menu{
display:none;
position:absolute;
background:#fff;
border:1px solid #ced4da;
width:100%;
z-index:1000;
}

.dropdown-status-menu div{
padding:8px;
cursor:pointer;
color:#fff;
font-weight:bold;
}

.status-agendada{background:#f0ad4e;}
.status-confirmada{background:#5bc0de;}
.status-cancelada{background:#d9534f;}
.status-finalizada{background:#5cb85c;}

.lista{
max-height:200px;
overflow-y:auto;
border:1px solid #ced4da;
border-radius:5px;
}

.lista div{
padding:8px;
cursor:pointer;
}

.lista div:hover{
background:#f2f2f2;
}

</style>
</head>

<body class="bg-light">

<div class="d-flex">

<div class="bg-primary text-white p-3" style="width:250px;min-height:100vh;">

<h4>
<a href="principal.html" class="text-white text-decoration-none">
Agenda Médica
</a>
</h4>

<hr>

<ul class="nav nav-pills flex-column">

<li class="nav-item">
<a href="novaConsulta.html" class="nav-link text-white">Nova Consulta</a>
</li>

<li class="nav-item">
<a href="listaDeConsultas.html" class="nav-link text-white">Consultas</a>
</li>

<li class="nav-item">
<a href="medicos.html" class="nav-link text-white">Médicos</a>
</li>

<li class="nav-item">
<a href="pacientes.html" class="nav-link text-white">Pacientes</a>
</li>

</ul>

</div>

<div class="flex-fill p-4">

<h2>Agendar Nova Consulta</h2>

<form id="formNovaConsulta">

<!-- MÉDICO -->

<div class="mb-3">

<label class="form-label">Médico</label>

<div class="row">

<div class="col-md-6">
<input type="text" id="buscaMedicoNome" class="form-control" placeholder="Buscar por nome">
</div>

<div class="col-md-6">
<input type="text" id="buscaMedicoCrm" class="form-control" placeholder="Buscar por CRM">
</div>

</div>

<div id="listaMedicos" class="lista mt-2"></div>

<input type="hidden" id="medicoId">

</div>

<!-- PACIENTE -->

<div class="mb-3">

<label class="form-label">Paciente</label>

<div class="row">

<div class="col-md-6">
<input type="text" id="buscaNome" class="form-control" placeholder="Buscar por nome">
</div>

<div class="col-md-6">
<input type="text" id="buscaCpf" class="form-control" placeholder="Buscar por CPF">
</div>

</div>

<div id="listaPacientes" class="lista mt-2"></div>

<input type="hidden" id="pacienteId">

</div>

<div class="mb-3">
<label class="form-label">Data</label>
<input type="date" id="dataConsulta" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Horário</label>
<input type="time" id="horarioConsulta" class="form-control" required>
</div>

<div class="mb-3">

<label class="form-label">Status</label>

<div class="dropdown-status">

<div id="statusSelecionado" class="dropdown-status-btn status-agendada">
AGENDADA
</div>

<div class="dropdown-status-menu">

<div class="status-agendada" data-value="AGENDADA">AGENDADA</div>
<div class="status-confirmada" data-value="CONFIRMADA">CONFIRMADA</div>
<div class="status-cancelada" data-value="CANCELADA">CANCELADA</div>
<div class="status-finalizada" data-value="FINALIZADA">FINALIZADA</div>

</div>

</div>

</div>

<button type="submit" class="btn btn-primary">
Agendar Consulta
</button>

</form>

<div id="mensagem" class="mt-3"></div>

</div>
</div>

<script>

let statusAtual="AGENDADA"


// ===============================
// FORMATAR CPF
// ===============================

function formatarCPF(cpf){

cpf = cpf.replace(/\D/g,'')

if(cpf.length !== 11) return cpf

return cpf.replace(
/(\d{3})(\d{3})(\d{3})(\d{2})/,
"$1.$2.$3-$4"
)

}


// ==========================
// BUSCA MÉDICO NOME
// ==========================

document.getElementById("buscaMedicoNome")
.addEventListener("input",function(){

const nome=this.value

document.getElementById("buscaMedicoCrm").value=""

if(nome.length<2){
document.getElementById("listaMedicos").innerHTML=""
return
}

buscarMedico(`nome=${nome}`)

})


// ==========================
// BUSCA MÉDICO CRM
// ==========================

document.getElementById("buscaMedicoCrm")
.addEventListener("input",function(){

const crm=this.value

document.getElementById("buscaMedicoNome").value=""

if(crm.length<2){
document.getElementById("listaMedicos").innerHTML=""
return
}

buscarMedico(`crm=${crm}`)

})


// ==========================
// BUSCAR MÉDICO
// ==========================

async function buscarMedico(param){

const res=await fetch(`http://localhost:8080/api/medicos?${param}&size=10`)
const data=await res.json()

const lista=document.getElementById("listaMedicos")
lista.innerHTML=""

data.content.forEach(m=>{

const div=document.createElement("div")
div.textContent = m.nome + " - CRM: " + m.crm

div.onclick=()=>{

document.getElementById("medicoId").value = m.id
document.getElementById("buscaMedicoNome").value = m.nome
document.getElementById("buscaMedicoCrm").value = m.crm

lista.innerHTML=""

}

lista.appendChild(div)

})

}


// ==========================
// BUSCA PACIENTE NOME
// ==========================

document.getElementById("buscaNome")
.addEventListener("input",function(){

const nome=this.value
document.getElementById("buscaCpf").value=""

if(nome.length<2){
document.getElementById("listaPacientes").innerHTML=""
return
}

buscarPaciente(`nome=${nome}`)

})


// ==========================
// BUSCA PACIENTE CPF
// ==========================

document.getElementById("buscaCpf")
.addEventListener("input",function(){

const cpf=this.value
document.getElementById("buscaNome").value=""

if(cpf.length<3){
document.getElementById("listaPacientes").innerHTML=""
return
}

buscarPaciente(`cpf=${cpf}`)

})


// ==========================
// BUSCAR PACIENTE
// ==========================

async function buscarPaciente(param){

const res=await fetch(`http://localhost:8080/api/pacientes?${param}&size=10`)
const data=await res.json()

const lista=document.getElementById("listaPacientes")
lista.innerHTML=""

data.content.forEach(p=>{

const div=document.createElement("div")

const cpfFormatado = formatarCPF(p.cpf)

div.textContent = p.nome + " - CPF: " + cpfFormatado

div.onclick=()=>{

document.getElementById("pacienteId").value=p.id
document.getElementById("buscaNome").value=p.nome
document.getElementById("buscaCpf").value=cpfFormatado

lista.innerHTML=""

}

lista.appendChild(div)

})

}


// ==========================
// DROPDOWN STATUS
// ==========================

const dropdownBtn=document.getElementById("statusSelecionado")
const dropdownMenu=document.querySelector(".dropdown-status-menu")

dropdownBtn.onclick=()=>{
dropdownMenu.style.display=
dropdownMenu.style.display==="block"?"none":"block"
}

dropdownMenu.querySelectorAll("div").forEach(item=>{

item.onclick=()=>{

statusAtual=item.dataset.value
dropdownBtn.textContent=statusAtual
dropdownBtn.className="dropdown-status-btn "+item.className

dropdownMenu.style.display="none"

}

})


// ==========================
// SALVAR CONSULTA
// ==========================

document.getElementById("formNovaConsulta")
.addEventListener("submit",async function(e){

e.preventDefault()

const dto={

medicoId:document.getElementById("medicoId").value,
pacienteId:document.getElementById("pacienteId").value,
data:document.getElementById("dataConsulta").value,
horario:document.getElementById("horarioConsulta").value,
status:statusAtual

}

const res=await fetch(
"http://localhost:8080/api/consultas",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(dto)
}
)

const msg=document.getElementById("mensagem")

if(res.ok){

msg.innerHTML='<div class="alert alert-success">Consulta agendada com sucesso</div>'
this.reset()

}else{

const err=await res.json()
msg.innerHTML='<div class="alert alert-warning">'+err.message+'</div>'

}

})

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
