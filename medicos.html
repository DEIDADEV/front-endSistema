<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Cadastro de Médicos</title>
</head>

<body class="bg-light">

<div class="d-flex">

  <!-- Sidebar -->
  <div class="bg-primary text-white p-3" style="width: 250px; min-height: 100vh;">
    <h4>
      <a href="principal.html" class="text-white text-decoration-none">Agenda Médica</a>
    </h4>
    <hr>
    <ul class="nav nav-pills flex-column">
      <li class="nav-item"><a href="novaConsulta.html" class="nav-link text-white">Nova Consulta</a></li>
      <li class="nav-item"><a href="listaDeConsultas.html" class="nav-link text-white">Consultas</a></li>
      <li class="nav-item"><a href="medicos.html" class="nav-link text-white">Médicos</a></li>
      <li class="nav-item"><a href="pacientes.html" class="nav-link text-white">Pacientes</a></li>
    </ul>
  </div>

  <!-- Conteúdo -->
  <div class="flex-fill p-4" id="conteudoPrincipal">
    <h2>Cadastro de Médicos</h2>

    <!-- Formulário -->
    <form id="formMedico">
      <div class="mb-3">
        <label for="nome" class="form-label">Nome:</label>
        <input type="text" id="nome" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="crm" class="form-label">CRM:</label>
        <input type="text" id="crm" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="especialidade" class="form-label">Especialidade:</label>
        <input type="text" id="especialidade" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary" id="btnCadastrar">Cadastrar</button>
      <button type="button" class="btn btn-secondary ms-2" id="btnCancelarEdicao" style="display:none;">Cancelar</button>
    </form>
    <div id="mensagemMedico" class="mt-3"></div>

    <hr>

    <!-- Tabela de médicos existentes -->
    <h3>Médicos Cadastrados</h3>
    <table class="table table-bordered align-middle text-center">
      <thead>
        <tr>
          <th>Nome</th>
          <th>CRM</th>
          <th>Especialidade</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="medicosBody"></tbody>
    </table>
  </div>

</div>

<script>
const API_URL = "http://localhost:8080/api/medicos";
const formMedico = document.getElementById("formMedico");
const mensagemMedico = document.getElementById("mensagemMedico");
const medicosBody = document.getElementById("medicosBody");
const btnCadastrar = document.getElementById("btnCadastrar");
const btnCancelarEdicao = document.getElementById("btnCancelarEdicao");

let medicos = [];
let editandoId = null; // Id do médico em edição

// Carregar médicos da API
async function carregarMedicos() {
  try {
    const res = await fetch(API_URL);
    medicos = await res.json();
    renderizarTabela();
  } catch (err) {
    console.error(err);
    medicosBody.innerHTML = '<tr><td colspan="4">Erro ao carregar médicos.</td></tr>';
  }
}

// Renderiza tabela
function renderizarTabela() {
  medicosBody.innerHTML = '';
  medicos.forEach(m => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${m.nome}</td>
      <td>${m.crm}</td>
      <td>${m.especialidade}</td>
      <td>
        <button class="btn btn-sm btn-warning me-1" onclick="editarMedico(${m.id})">Editar</button>
        <button class="btn btn-sm btn-danger" onclick="excluirMedico(${m.id})">Excluir</button>
      </td>
    `;
    medicosBody.appendChild(tr);
  });
}

// Cadastro ou atualização de médico
formMedico.addEventListener("submit", async (e) => {
  e.preventDefault();
  const medico = {
    nome: document.getElementById("nome").value,
    crm: document.getElementById("crm").value,
    especialidade: document.getElementById("especialidade").value
  };

  try {
    let res;
    if (editandoId) {
      // Atualizar médico existente
      res = await fetch(`${API_URL}/${editandoId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(medico)
      });
    } else {
      // Cadastrar novo médico
      res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(medico)
      });
    }

    if (res.ok) {
      mensagemMedico.innerHTML = `<div class="alert alert-success">${editandoId ? "Médico atualizado" : "Médico cadastrado"} com sucesso!</div>`;
      formMedico.reset();
      editandoId = null;
      btnCadastrar.textContent = "Cadastrar";
      btnCancelarEdicao.style.display = "none";
      await carregarMedicos();
    } else {
      mensagemMedico.innerHTML = `<div class="alert alert-danger">Erro ao ${editandoId ? "atualizar" : "cadastrar"} médico.</div>`;
    }

  } catch (err) {
    mensagemMedico.innerHTML = `<div class="alert alert-danger">Erro ao ${editandoId ? "atualizar" : "cadastrar"} médico.</div>`;
    console.error(err);
  }
});

// Editar médico
function editarMedico(id) {
  const medico = medicos.find(m => m.id === id);
  if (!medico) return;

  document.getElementById("nome").value = medico.nome;
  document.getElementById("crm").value = medico.crm;
  document.getElementById("especialidade").value = medico.especialidade;

  editandoId = id;
  btnCadastrar.textContent = "Atualizar";
  btnCancelarEdicao.style.display = "inline-block";
}

// Cancelar edição
btnCancelarEdicao.addEventListener("click", () => {
  formMedico.reset();
  editandoId = null;
  btnCadastrar.textContent = "Cadastrar";
  btnCancelarEdicao.style.display = "none";
});

// Excluir médico
async function excluirMedico(id) {
  if (!confirm("Tem certeza que deseja excluir este médico?")) return;
  try {
    const res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
    if (res.ok) {
      mensagemMedico.innerHTML = `<div class="alert alert-success">Médico excluído com sucesso!</div>`;
      await carregarMedicos();
    } else {
      mensagemMedico.innerHTML = `<div class="alert alert-danger">Erro ao excluir médico.</div>`;
    }
  } catch (err) {
    mensagemMedico.innerHTML = `<div class="alert alert-danger">Erro ao excluir médico.</div>`;
    console.error(err);
  }
}

// Inicialização
window.addEventListener("DOMContentLoaded", () => {
  carregarMedicos();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
